<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extract Text — Document OCR</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <main class="container glass-panel">
        <header class="app-header">
            <div class="logo">
                <svg class="icon-doc" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                <h1>Extract Text</h1>
            </div>
            <p class="subtitle">Secure, fast, 100% offline document OCR</p>
        </header>

        <form id="upload-form" class="upload-section">
            <div id="drop-zone" class="drop-zone">
                <input type="file" id="file-input" name="file" accept=".jpg,.jpeg,.png,.pdf,.bmp,.tiff,.tif,.webp"
                    hidden>

                <div class="drop-content" id="drop-state-empty">
                    <div class="upload-icon-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17 8 12 3 7 8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                        </svg>
                    </div>
                    <h3>Drag & drop a file here</h3>
                    <p>or <button type="button" class="text-btn" id="browse-btn">browse your computer</button></p>
                    <div class="supported-formats">
                        <span>JPG</span><span>PNG</span><span>PDF</span><span>TIFF</span>
                    </div>
                </div>

                <div class="drop-content hidden" id="drop-state-selected">
                    <div class="file-preview">
                        <img id="preview-img" src="" alt="File Preview">
                        <div class="file-icon" id="preview-doc">
                            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                            </svg>
                        </div>
                    </div>
                    <h4 id="selected-filename" class="truncate">filename.pdf</h4>
                    <p id="selected-filesize" class="file-size">1.2 MB</p>
                    <button type="button" class="text-btn danger-text" id="remove-file-btn">Remove file</button>
                </div>
            </div>

            <div class="settings-row">
                <label for="language-select">Document Language</label>
                <div class="select-wrapper">
                    <select id="language-select" name="language">
                        <option value="eng">English</option>
                        <option value="hin">Hindi</option>
                        <option value="fra">French</option>
                        <option value="spa">Spanish</option>
                        <option value="deu">German</option>
                    </select>
                </div>
            </div>

            <button type="submit" id="submit-btn" class="primary-btn" disabled>
                <span class="btn-text">Extract Text</span>
                <div class="spinner hidden"></div>
            </button>
        </form>

        <div id="error-message" class="error-toast hidden"></div>
    </main>

    <script src="app.js"></script>
</body>

</html>
